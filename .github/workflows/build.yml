name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: oracle
          cache: maven

      - name: Build with Maven
        run: mvn -B package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RemoveTellRaw
          path: target/*.jar

      - name: Create Release
        if: github.event_name == 'push'
        uses: ncipollo/release-action@v1
        with:
          artifacts: target/*.jar
          tag: latest
          name: Latest Build
          body: |
            Automated build from commit ${{ github.sha }}
          removeArtifacts: true
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
